<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>Manga Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131c;
      --surface2: #1c1c2a;
      --border: #2a2a3d;
      --accent: #e8483a;
      --accent2: #f0c040;
      --text: #f0ede8;
      --text-dim: #8888a0;
      --owned: #2a9d5c;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(180deg, #0a0a0f 80%, transparent);
      padding: 16px 16px 8px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .app-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(232,72,58,0.4);
    }

    .stats-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .stats-pill span {
      color: var(--accent2);
      font-weight: 700;
    }

    /* SEARCH & SERIES SELECTOR */
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }

    .series-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 14px;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .series-btn:active { transform: scale(0.96); }
    .series-btn .icon { font-size: 16px; }

    /* PROGRESS BAR */
    .progress-wrap {
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* SERIES MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; align-items: flex-end; }

    .modal {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 20px 16px 40px;
      width: 100%;
      border-top: 1px solid var(--border);
    }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .series-list { display: flex; flex-direction: column; gap: 10px; }

    .series-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
    }
    .series-item.active {
      border-color: var(--accent);
      background: rgba(232,72,58,0.08);
    }
    .series-item:active { transform: scale(0.98); }
    .series-emoji { font-size: 28px; }
    .series-info { flex: 1; }
    .series-name { font-weight: 700; font-size: 15px; }
    .series-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .series-check { color: var(--accent); font-size: 18px; opacity: 0; }
    .series-item.active .series-check { opacity: 1; }

    .add-series-btn {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .add-series-btn:active { border-color: var(--accent); color: var(--accent); }

    /* VIEW TOGGLE */
    .view-toggle {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }
    .toggle-btn {
      flex: 1;
      padding: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* GRID */
    .grid-container {
      padding: 0 16px 100px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .grid.list-view {
      grid-template-columns: 1fr;
    }

    /* TOMO CARD */
    .tomo-card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      aspect-ratio: 2/3;
      -webkit-tap-highlight-color: transparent;
    }

    .tomo-card.owned {
      border-color: var(--owned);
    }

    .tomo-card:active { transform: scale(0.94); }

    .tomo-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }

    .cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--surface2), var(--surface));
      gap: 6px;
    }
    .cover-placeholder .vol-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: var(--accent);
      line-height: 1;
    }
    .cover-placeholder .vol-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tomo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 35%, transparent 65%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 8px;
    }

    .tomo-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      line-height: 1;
      color: white;
    }

    .owned-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      background: var(--owned);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .tomo-card.owned .owned-badge { opacity: 1; }

    /* LIST VIEW CARD */
    .list-view .tomo-card {
      aspect-ratio: unset;
      display: flex;
      flex-direction: row;
      align-items: center;
      height: 72px;
    }
    .list-view .tomo-cover {
      width: 48px;
      height: 72px;
      flex-shrink: 0;
      border-radius: 0;
    }
    .list-view .cover-placeholder {
      width: 48px;
      height: 72px;
      flex-shrink: 0;
      border-radius: 0;
    }
    .list-view .cover-placeholder .vol-number { font-size: 22px; }
    .list-view .tomo-overlay {
      position: static;
      background: none;
      flex: 1;
      padding: 0 12px;
      justify-content: center;
    }
    .list-view .tomo-num {
      font-size: 16px;
      color: var(--text);
    }
    .list-view .tomo-subtitle {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .list-view .owned-badge {
      position: static;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .list-view .tomo-card.owned .owned-badge { opacity: 1; }
    .list-view .tomo-card:not(.owned) .owned-badge {
      opacity: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    /* SECTION HEADER */
    .section-header {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 1px;
      color: var(--text-dim);
      padding: 12px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    /* FILTER TABS */
    .filter-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }

    .filter-tab {
      white-space: nowrap;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* LOADING */
    .loading-msg {
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
      padding: 40px 0;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ADD CUSTOM SERIES MODAL */
    .input-field {
      width: 100%;
      padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: white;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="app-title">📚 MANGA LIST</div>
    <div class="stats-pill" id="statsDisplay">
      <span id="ownedCount">0</span> / <span id="totalCount">0</span> tomos
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="controls">
    <button class="series-btn" id="seriesBtn" onclick="openSeriesModal()">
      <span class="icon">🍃</span>
      <span id="seriesBtnLabel">Naruto</span>
      <span>▾</span>
    </button>
  </div>
  <div class="filter-tabs">
    <div class="filter-tab active" onclick="setFilter('all', this)">Todos</div>
    <div class="filter-tab" onclick="setFilter('owned', this)">Tengo</div>
    <div class="filter-tab" onclick="setFilter('missing', this)">Faltan</div>
  </div>
  <div class="view-toggle">
    <button class="toggle-btn active" id="gridBtn" onclick="setView('grid')">⊞ Cuadrícula</button>
    <button class="toggle-btn" id="listBtn" onclick="setView('list')">≡ Lista</button>
  </div>
</header>

<div class="grid-container">
  <div class="grid" id="mainGrid">
    <div class="loading-msg"><span class="spinner"></span> Cargando tomos...</div>
  </div>
</div>

<!-- SERIES MODAL -->
<div class="modal-overlay" id="seriesModal" onclick="closeSeriesModal(event)">
  <div class="modal">
    <div class="modal-title">Mis Series</div>
    <div class="series-list" id="seriesList"></div>
    <button class="add-series-btn" onclick="openAddSeries()">+ Añadir serie manualmente</button>
  </div>
</div>

<!-- ADD SERIES MODAL -->
<div class="modal-overlay" id="addSeriesModal" onclick="closeAddModal(event)">
  <div class="modal">
    <div class="modal-title">Nueva Serie</div>
    <input class="input-field" id="newSeriesName" placeholder="Nombre de la serie (ej: One Piece)" type="text">
    <input class="input-field" id="newSeriesEmoji" placeholder="Emoji (ej: 🏴‍☠️)" type="text" maxlength="4">
    <input class="input-field" id="newSeriesVolumes" placeholder="Número de tomos" type="number" min="1">
    <button class="btn-primary" onclick="addCustomSeries()">AÑADIR SERIE</button>
    <button class="btn-secondary" onclick="closeAddModal()">Cancelar</button>
  </div>
</div>

<script>
// ============================================
// DATA
// ============================================
const SERIES_DB = [
  {
    id: 'naruto',
    name: 'Naruto',
    emoji: '🍃',
    volumes: 72,
    mangadexId: 'e7eabe96-aa17-476f-b431-2497d5e9d060',
    color: '#e8700a'
  },
  {
    id: 'naruto-shippuden',
    name: 'Naruto Shippūden',
    emoji: '🌀',
    volumes: 27, // anime tomos compilación
    mangadexId: null,
    color: '#4466cc'
  }
];

let state = {
  currentSeriesId: 'naruto',
  filter: 'all',
  view: 'grid',
  owned: JSON.parse(localStorage.getItem('manga_owned') || '{}'),
  covers: JSON.parse(localStorage.getItem('manga_covers') || '{}'),
  customSeries: JSON.parse(localStorage.getItem('manga_custom_series') || '[]'),
};

function allSeries() {
  return [...SERIES_DB, ...state.customSeries];
}

function getCurrentSeries() {
  return allSeries().find(s => s.id === state.currentSeriesId) || SERIES_DB[0];
}

function saveOwned() {
  localStorage.setItem('manga_owned', JSON.stringify(state.owned));
}

// ============================================
// COVERS — Open Library por ISBN (Naruto edición española Planeta)
// ============================================

const NARUTO_ISBNS = {
  1:'9788415866046',2:'9788415866053',3:'9788415866060',4:'9788415866077',
  5:'9788415866084',6:'9788415866091',7:'9788415866107',8:'9788415866114',
  9:'9788415866121',10:'9788415866138',11:'9788415866145',12:'9788415866152',
  13:'9788415866169',14:'9788415866176',15:'9788415866183',16:'9788415866190',
  17:'9788415866206',18:'9788415866213',19:'9788415866220',20:'9788415866237',
  21:'9788415866244',22:'9788415866251',23:'9788415866268',24:'9788415866275',
  25:'9788415866282',26:'9788415866299',27:'9788415866305',28:'9788415866312',
  29:'9788415866329',30:'9788415866336',31:'9788415866343',32:'9788415866350',
  33:'9788415866367',34:'9788415866374',35:'9788415866381',36:'9788415866398',
  37:'9788415866404',38:'9788415866411',39:'9788415866428',40:'9788415866435',
  41:'9788415866442',42:'9788415866459',43:'9788415866466',44:'9788415866473',
  45:'9788415866480',46:'9788415866497',47:'9788415866503',48:'9788415866510',
  49:'9788415866527',50:'9788415866534',51:'9788415866541',52:'9788415866558',
  53:'9788415866565',54:'9788415866572',55:'9788415866589',56:'9788415866596',
  57:'9788415866602',58:'9788415866619',59:'9788415866626',60:'9788415866633',
  61:'9788415866640',62:'9788415866657',63:'9788415866664',64:'9788415866671',
  65:'9788415866688',66:'9788415866695',67:'9788415866701',68:'9788415866718',
  69:'9788415866725',70:'9788415866732',71:'9788415866749',72:'9788415866756',
};

function getCoverUrl(seriesId, vol) {
  if (seriesId === 'naruto' && NARUTO_ISBNS[vol]) {
    return `https://covers.openlibrary.org/b/isbn/${NARUTO_ISBNS[vol]}-M.jpg`;
  }
  return null;
}

async function fetchCovers(mangadexId, seriesId, totalVolumes) {
  // No-op: covers se generan directamente desde ISBN en getCoverUrl()
}

// ============================================
// UI RENDER
// ============================================
function getSeriesOwnedKey(seriesId, vol) {
  return `${seriesId}_${vol}`;
}

function isOwned(seriesId, vol) {
  return !!state.owned[getSeriesOwnedKey(seriesId, vol)];
}

function toggleOwned(seriesId, vol) {
  const key = getSeriesOwnedKey(seriesId, vol);
  if (state.owned[key]) {
    delete state.owned[key];
  } else {
    state.owned[key] = true;
  }
  saveOwned();
  updateStats();
  updateCard(seriesId, vol);
}

function updateCard(seriesId, vol) {
  const card = document.querySelector(`[data-vol="${vol}"]`);
  if (!card) return;
  const owned = isOwned(seriesId, vol);
  card.classList.toggle('owned', owned);
  const badge = card.querySelector('.owned-badge');
  if (badge && state.view === 'list') {
    badge.textContent = owned ? '✓' : '○';
  }
}

function updateStats() {
  const series = getCurrentSeries();
  let count = 0;
  for (let i = 1; i <= series.volumes; i++) {
    if (isOwned(series.id, i)) count++;
  }
  document.getElementById('ownedCount').textContent = count;
  document.getElementById('totalCount').textContent = series.volumes;
  const pct = series.volumes > 0 ? (count / series.volumes * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function renderGrid() {
  const series = getCurrentSeries();
  const grid = document.getElementById('mainGrid');
  grid.className = 'grid' + (state.view === 'list' ? ' list-view' : '');

  let html = '';
  const tomos = [];
  for (let i = 1; i <= series.volumes; i++) {
    const owned = isOwned(series.id, i);
    if (state.filter === 'owned' && !owned) continue;
    if (state.filter === 'missing' && owned) continue;
    tomos.push({ i, owned, cover: getCoverUrl(series.id, i) });
  }

  if (tomos.length === 0) {
    html = `<div class="loading-msg" style="grid-column:1/-1">Ningún tomo en este filtro.</div>`;
  } else if (state.view === 'list') {
    for (const { i, owned, cover } of tomos) {
      html += `
        <div class="tomo-card ${owned ? 'owned' : ''}" data-vol="${i}" onclick="toggleOwned('${series.id}', ${i})">
          ${cover
            ? `<img class="tomo-cover" src="${cover}" alt="Vol ${i}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''
          }
          <div class="cover-placeholder" style="${cover ? 'display:none' : ''}">
            <div class="vol-number">${i}</div>
          </div>
          <div class="tomo-overlay">
            <div class="tomo-num">Tomo ${i}</div>
            <div class="tomo-subtitle">${series.name}</div>
          </div>
          <div class="owned-badge">${owned ? '✓' : '○'}</div>
        </div>`;
    }
  } else {
    for (const { i, owned, cover } of tomos) {
      html += `
        <div class="tomo-card ${owned ? 'owned' : ''}" data-vol="${i}" onclick="toggleOwned('${series.id}', ${i})">
          ${cover
            ? `<img class="tomo-cover" src="${cover}" alt="Vol ${i}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''
          }
          <div class="cover-placeholder" style="${cover ? 'display:none' : ''}">
            <div class="vol-number">${i}</div>
            <div class="vol-label">Tomo</div>
          </div>
          <div class="tomo-overlay">
            <div class="tomo-num">Vol.${i}</div>
          </div>
          <div class="owned-badge">✓</div>
        </div>`;
    }
  }

  grid.innerHTML = html;
  updateStats();
}

// ============================================
// SERIES MODAL
// ============================================
function renderSeriesList() {
  const list = document.getElementById('seriesList');
  const series = allSeries();
  list.innerHTML = series.map(s => `
    <div class="series-item ${s.id === state.currentSeriesId ? 'active' : ''}" onclick="selectSeries('${s.id}')">
      <div class="series-emoji">${s.emoji}</div>
      <div class="series-info">
        <div class="series-name">${s.name}</div>
        <div class="series-sub">${s.volumes} tomos · ${getOwnedCount(s.id, s.volumes)} tengo</div>
      </div>
      <div class="series-check">✓</div>
    </div>
  `).join('');
}

function getOwnedCount(seriesId, volumes) {
  let count = 0;
  for (let i = 1; i <= volumes; i++) {
    if (isOwned(seriesId, i)) count++;
  }
  return count;
}

function openSeriesModal() {
  renderSeriesList();
  document.getElementById('seriesModal').classList.add('open');
}

function closeSeriesModal(e) {
  if (!e || e.target === document.getElementById('seriesModal')) {
    document.getElementById('seriesModal').classList.remove('open');
  }
}

function selectSeries(id) {
  state.currentSeriesId = id;
  closeSeriesModal();
  const series = getCurrentSeries();
  document.getElementById('seriesBtnLabel').textContent = series.name;
  document.querySelector('.series-btn .icon').textContent = series.emoji;
  renderGrid();
  if (series.mangadexId) {
    fetchCovers(series.mangadexId, series.id, series.volumes);
  }
}

// ============================================
// ADD SERIES
// ============================================
function openAddSeries() {
  closeSeriesModal();
  document.getElementById('addSeriesModal').classList.add('open');
}

function closeAddModal(e) {
  if (!e || e.target === document.getElementById('addSeriesModal')) {
    document.getElementById('addSeriesModal').classList.remove('open');
  }
}

function addCustomSeries() {
  const name = document.getElementById('newSeriesName').value.trim();
  const emoji = document.getElementById('newSeriesEmoji').value.trim() || '📖';
  const volumes = parseInt(document.getElementById('newSeriesVolumes').value) || 1;

  if (!name) { alert('Escribe el nombre de la serie'); return; }

  const id = 'custom_' + name.toLowerCase().replace(/\s+/g, '_') + '_' + Date.now();
  const newSeries = { id, name, emoji, volumes, mangadexId: null, color: '#888' };
  state.customSeries.push(newSeries);
  localStorage.setItem('manga_custom_series', JSON.stringify(state.customSeries));
  
  document.getElementById('newSeriesName').value = '';
  document.getElementById('newSeriesEmoji').value = '';
  document.getElementById('newSeriesVolumes').value = '';
  closeAddModal();
  selectSeries(id);
}

// ============================================
// FILTER & VIEW
// ============================================
function setFilter(filter, el) {
  state.filter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

function setView(view) {
  state.view = view;
  document.getElementById('gridBtn').classList.toggle('active', view === 'grid');
  document.getElementById('listBtn').classList.toggle('active', view === 'list');
  renderGrid();
}

// ============================================
// INIT
// ============================================
function init() {
  // Limpiar caché de covers para forzar re-fetch con URLs actualizadas
  localStorage.removeItem('manga_covers');
  state.covers = {};

  const series = getCurrentSeries();
  document.getElementById('seriesBtnLabel').textContent = series.name;
  document.querySelector('.series-btn .icon').textContent = series.emoji;
  renderGrid();
  if (series.mangadexId) {
    fetchCovers(series.mangadexId, series.id, series.volumes);
  }
}

init();
</script>
</body>
</html>
